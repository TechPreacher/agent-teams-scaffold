name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install fish (exercises the launcher syntax test)
        run: sudo apt-get update && sudo apt-get install -y fish

      - name: Compile the generator
        run: python -m py_compile skills/agent-teams-scaffold/scripts/scaffold.py

      - name: Manifests parse as JSON
        run: |
          python -c "import json; json.load(open('.claude-plugin/plugin.json')); json.load(open('.claude-plugin/marketplace.json'))"

      - name: Run the suite (stdlib unittest, no deps)
        run: python -m unittest discover -s tests -v

      - name: Run the suite under pytest (discovery sanity check)
        run: |
          python -m pip install --upgrade pip pytest
          pytest -v
